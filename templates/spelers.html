{% extends "base.html" %}

{% block content %}
  <h2>Spelers</h2>
  <table>
    <thead>
      <tr>
        <th>Naam</th>
        <th>Rating</th>
        <th>Acties</th>
      </tr>
    </thead>
    <tbody>
      {% for p in players %}
      <tr>
        <td>{{ p.name }}</td>
        <td>{{ p.rating }}</td>
        <td class="player-actions">
          <a class="btn" href="{{ url_for('edit_player', player_id=p.id) }}">Bewerk</a>
          <form
            method="POST"
            action="{{ url_for('delete_player', player_id=p.id) }}"
            onsubmit="return confirm('Weet je zeker dat je {{ p.name|e }} wilt verwijderen?');"
          >
            <button type="submit" class="btn btn-danger">Verwijder</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
